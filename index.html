<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Model Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* Art direction: Technical reference tool → clean, precise, data-forward
   Palette: cool dark slate with teal accent
   Typography: Instrument Serif display + Inter body
   Density: dense/balanced */

:root, [data-theme="light"] {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
  --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem;

  --color-bg:             #f7f6f2;
  --color-surface:        #f9f8f5;
  --color-surface-2:      #fbfbf9;
  --color-surface-offset: #f0ede8;
  --color-divider:        #dcd9d5;
  --color-border:         #d4d1ca;
  --color-text:           #28251d;
  --color-text-muted:     #6a6961;
  --color-text-faint:     #bab9b4;
  --color-text-inverse:   #f9f8f4;
  --color-primary:        #01696f;
  --color-primary-hover:  #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-success:        #437a22;
  --color-success-highlight: #d4dfcc;
  --color-blue:           #006494;
  --color-blue-highlight: #c6d8e4;
  --color-orange:         #b85c00;
  --color-orange-highlight: #ecddd0;
  --color-purple:         #6a2fa8;
  --color-purple-highlight: #ddd0f0;

  --radius-sm: 0.375rem; --radius-md: 0.5rem;
  --radius-lg: 0.75rem;  --radius-xl: 1rem; --radius-full: 9999px;
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --content-wide: 1200px;
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Inter', 'Helvetica Neue', sans-serif;
}

[data-theme="dark"] {
  --color-bg:             #12110f;
  --color-surface:        #181714;
  --color-surface-2:      #1e1d1b;
  --color-surface-offset: #232220;
  --color-divider:        #2a2927;
  --color-border:         #353432;
  --color-text:           #d4d3d0;
  --color-text-muted:     #7a7976;
  --color-text-faint:     #4a4948;
  --color-text-inverse:   #2b2a28;
  --color-primary:        #4f98a3;
  --color-primary-hover:  #6ab0bb;
  --color-primary-highlight: #1f3336;
  --color-success:        #6daa45;
  --color-success-highlight: #1e2e18;
  --color-blue:           #5591c7;
  --color-blue-highlight: #1a2a3a;
  --color-orange:         #e07b30;
  --color-orange-highlight: #2e1e10;
  --color-purple:         #a070df;
  --color-purple-highlight: #241540;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.45);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg:#12110f;--color-surface:#181714;--color-surface-2:#1e1d1b;
    --color-surface-offset:#232220;--color-divider:#2a2927;--color-border:#353432;
    --color-text:#d4d3d0;--color-text-muted:#7a7976;--color-text-faint:#4a4948;
    --color-text-inverse:#2b2a28;--color-primary:#4f98a3;--color-primary-hover:#6ab0bb;
    --color-primary-highlight:#1f3336;--color-success:#6daa45;--color-success-highlight:#1e2e18;
    --color-blue:#5591c7;--color-blue-highlight:#1a2a3a;--color-orange:#e07b30;
    --color-orange-highlight:#2e1e10;--color-purple:#a070df;--color-purple-highlight:#241540;
    --shadow-sm:0 1px 2px oklch(0 0 0/.25);--shadow-md:0 4px 12px oklch(0 0 0/.35);
    --shadow-lg:0 12px 32px oklch(0 0 0/.45);
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; scroll-padding-top: 80px; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: var(--color-bg); line-height: 1.6; }
img, svg { display: block; max-width: 100%; }
button, input, select { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; }
h1,h2,h3,h4 { text-wrap: balance; line-height: 1.2; }
p { text-wrap: pretty; }
a { color: var(--color-primary); text-decoration: none; }
a:hover { color: var(--color-primary-hover); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
a, button, input, select { transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive); }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header-inner {
  max-width: var(--content-wide); margin-inline: auto;
  padding: var(--space-4) var(--space-6);
  display: flex; align-items: center; gap: var(--space-6);
}
.logo { display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0; }
.logo-mark { color: var(--color-primary); }
.logo-text { font-family: var(--font-display); font-size: var(--text-lg); color: var(--color-text); letter-spacing: -0.01em; }
.logo-text span { color: var(--color-primary); font-style: italic; }
.header-search {
  flex: 1; max-width: 420px;
  position: relative;
}
.header-search input {
  width: 100%; padding: var(--space-2) var(--space-4) var(--space-2) var(--space-10);
  background: var(--color-surface-offset); border: 1px solid var(--color-border);
  border-radius: var(--radius-full); font-size: var(--text-sm);
  color: var(--color-text);
}
.header-search input:focus { outline: 2px solid var(--color-primary); outline-offset: 0; border-color: var(--color-primary); }
.header-search input::placeholder { color: var(--color-text-faint); }
.search-icon { position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%); color: var(--color-text-faint); pointer-events: none; }
.header-actions { margin-left: auto; display: flex; align-items: center; gap: var(--space-3); }
.stat-badge { font-size: var(--text-xs); color: var(--color-text-muted); background: var(--color-surface-offset); padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); border: 1px solid var(--color-border); white-space: nowrap; }
.theme-toggle { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); color: var(--color-text-muted); }
.theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

/* ── Main layout ── */
.page-layout {
  max-width: var(--content-wide); margin-inline: auto;
  padding: var(--space-8) var(--space-6);
  display: grid; grid-template-columns: 220px 1fr; gap: var(--space-8);
}
@media (max-width: 768px) {
  .page-layout { grid-template-columns: 1fr; padding: var(--space-4); gap: var(--space-6); }
  .sidebar { display: none; }
  .mobile-filters { display: flex !important; }
}

/* ── Sidebar ── */
.sidebar { flex-shrink: 0; }
.sidebar-section { margin-bottom: var(--space-8); }
.sidebar-label { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-faint); margin-bottom: var(--space-3); }
.filter-group { display: flex; flex-direction: column; gap: var(--space-1); }
.filter-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
  font-size: var(--text-sm); color: var(--color-text-muted); text-align: left; width: 100%;
}
.filter-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
.filter-btn.active { background: var(--color-primary-highlight); color: var(--color-primary); font-weight: 500; }
.filter-count { font-size: var(--text-xs); color: var(--color-text-faint); background: var(--color-surface-offset); padding: 1px var(--space-2); border-radius: var(--radius-full); }
.filter-btn.active .filter-count { background: var(--color-primary); color: var(--color-text-inverse); }

/* ── Mobile filter bar ── */
.mobile-filters {
  display: none; gap: var(--space-2); overflow-x: auto; padding-bottom: var(--space-2);
  scrollbar-width: none;
}
.mobile-filters::-webkit-scrollbar { display: none; }
.mobile-chip {
  flex-shrink: 0; padding: var(--space-2) var(--space-4);
  border: 1px solid var(--color-border); border-radius: var(--radius-full);
  font-size: var(--text-xs); color: var(--color-text-muted); background: var(--color-surface);
  white-space: nowrap;
}
.mobile-chip.active { background: var(--color-primary-highlight); border-color: var(--color-primary); color: var(--color-primary); }

/* ── Registry grid ── */
.registry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-6); }
.registry-title { font-size: var(--text-lg); font-weight: 600; }
.result-count { font-size: var(--text-sm); color: var(--color-text-muted); }
.sort-select {
  padding: var(--space-2) var(--space-3); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); background: var(--color-surface);
  font-size: var(--text-sm); color: var(--color-text); cursor: pointer;
}
.sort-select:focus { outline: 2px solid var(--color-primary); }

.cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
  gap: var(--space-4);
}

/* ── Model Card ── */
.model-card {
  background: var(--color-surface); border: 1px solid var(--color-divider);
  border-radius: var(--radius-xl); padding: var(--space-6);
  cursor: pointer; position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition-interactive), transform var(--transition-interactive), border-color var(--transition-interactive);
}
.model-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); border-color: var(--color-border); }
.model-card:active { transform: translateY(0); }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: var(--space-4); }
.card-brand { display: flex; align-items: center; gap: var(--space-2); }
.brand-logo {
  width: 32px; height: 32px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
  border: 1px solid var(--color-divider);
}
.brand-name { font-size: var(--text-xs); color: var(--color-text-muted); }
.card-badges { display: flex; gap: var(--space-2); flex-wrap: wrap; }
.badge {
  font-size: var(--text-xs); font-weight: 500; padding: 2px var(--space-2);
  border-radius: var(--radius-full); white-space: nowrap;
}
.badge-open { background: var(--color-success-highlight); color: var(--color-success); }
.badge-closed { background: var(--color-surface-offset); color: var(--color-text-muted); }
.badge-multimodal { background: var(--color-blue-highlight); color: var(--color-blue); }
.badge-reasoning { background: var(--color-orange-highlight); color: var(--color-orange); }
.badge-code { background: var(--color-purple-highlight); color: var(--color-purple); }

.card-name { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 400; letter-spacing: -0.01em; margin-bottom: var(--space-1); }
.card-version { font-size: var(--text-xs); color: var(--color-text-faint); margin-bottom: var(--space-3); }
.card-desc { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.55; margin-bottom: var(--space-4); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

.card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-4); }
.meta-item { }
.meta-label { font-size: var(--text-xs); color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.meta-value { font-size: var(--text-sm); font-weight: 500; color: var(--color-text); font-variant-numeric: tabular-nums; }

.card-tags { display: flex; gap: var(--space-2); flex-wrap: wrap; }
.tag { font-size: var(--text-xs); padding: 2px var(--space-2); background: var(--color-surface-offset); border-radius: var(--radius-sm); color: var(--color-text-muted); }

.card-footer { margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--color-divider); display: flex; align-items: center; justify-content: space-between; }
.card-link { font-size: var(--text-sm); color: var(--color-primary); font-weight: 500; display: flex; align-items: center; gap: var(--space-1); }
.card-link:hover { color: var(--color-primary-hover); }
.card-updated { font-size: var(--text-xs); color: var(--color-text-faint); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: oklch(0.1 0.01 80 / 0.5);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: var(--space-4);
  opacity: 0; pointer-events: none;
  transition: opacity 220ms ease;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--color-surface); border: 1px solid var(--color-divider);
  border-radius: var(--radius-xl); width: 100%; max-width: 680px; max-height: 90vh;
  overflow-y: auto; box-shadow: var(--shadow-lg);
  transform: translateY(12px) scale(0.98);
  transition: transform 220ms cubic-bezier(0.16,1,0.3,1);
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-header {
  padding: var(--space-6); border-bottom: 1px solid var(--color-divider);
  display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-4);
  position: sticky; top: 0; background: var(--color-surface); z-index: 1;
}
.modal-close {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); color: var(--color-text-muted); flex-shrink: 0;
}
.modal-close:hover { background: var(--color-surface-offset); color: var(--color-text); }
.modal-body { padding: var(--space-6); }
.modal-section { margin-bottom: var(--space-8); }
.modal-section:last-child { margin-bottom: 0; }
.modal-section-title { font-size: var(--text-sm); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-faint); margin-bottom: var(--space-4); }
.modal-desc { font-size: var(--text-base); color: var(--color-text-muted); line-height: 1.7; }
.modal-specs { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
@media (max-width: 500px) { .modal-specs { grid-template-columns: 1fr; } }
.spec-item { background: var(--color-surface-offset); padding: var(--space-4); border-radius: var(--radius-lg); }
.spec-label { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-faint); margin-bottom: var(--space-1); }
.spec-value { font-size: var(--text-base); font-weight: 600; color: var(--color-text); }
.use-cases { display: flex; flex-wrap: wrap; gap: var(--space-2); }
.use-case-tag { background: var(--color-primary-highlight); color: var(--color-primary); padding: var(--space-2) var(--space-4); border-radius: var(--radius-full); font-size: var(--text-sm); }
.benchmark-row { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-3); }
.benchmark-label { font-size: var(--text-sm); color: var(--color-text-muted); width: 100px; flex-shrink: 0; }
.benchmark-bar-wrap { flex: 1; height: 8px; background: var(--color-surface-offset); border-radius: var(--radius-full); overflow: hidden; }
.benchmark-bar { height: 100%; border-radius: var(--radius-full); background: var(--color-primary); transition: width 600ms cubic-bezier(0.16,1,0.3,1); }
.benchmark-score { font-size: var(--text-sm); font-weight: 600; font-variant-numeric: tabular-nums; width: 48px; text-align: right; color: var(--color-text); }

/* ── Empty state ── */
.empty-state { grid-column: 1 / -1; text-align: center; padding: var(--space-16) var(--space-8); color: var(--color-text-muted); }
.empty-icon { margin: 0 auto var(--space-4); color: var(--color-text-faint); }
.empty-state h3 { font-size: var(--text-lg); color: var(--color-text); margin-bottom: var(--space-2); }
.empty-state p { font-size: var(--text-sm); max-width: 36ch; margin: 0 auto var(--space-6); }
</style>
</head>
<body>

<a class="sr-only" href="#main">Skip to content</a>

<header>
  <div class="header-inner">
    <a href="#" class="logo" aria-label="AI Registry home">
      <svg class="logo-mark" aria-hidden="true" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="11" height="11" rx="2.5" fill="currentColor" opacity="1"/>
        <rect x="15" y="2" width="11" height="11" rx="2.5" fill="currentColor" opacity="0.5"/>
        <rect x="2" y="15" width="11" height="11" rx="2.5" fill="currentColor" opacity="0.5"/>
        <rect x="15" y="15" width="11" height="11" rx="2.5" fill="currentColor" opacity="0.25"/>
      </svg>
      <span class="logo-text">AI <span>Registry</span></span>
    </a>
    <div class="header-search">
      <svg class="search-icon" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Search models, providers…" aria-label="Search models">
    </div>
    <div class="header-actions">
      <span class="stat-badge" id="totalCount">20 models</span>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="page-layout" id="main">
  <!-- Sidebar -->
  <aside class="sidebar" aria-label="Filters">
    <div class="sidebar-section">
      <div class="sidebar-label">Provider</div>
      <div class="filter-group" id="providerFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Category</div>
      <div class="filter-group" id="categoryFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Access</div>
      <div class="filter-group" id="accessFilters"></div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="mobile-filters" id="mobileFilters" role="group" aria-label="Quick filters"></div>
    <div class="registry-header">
      <div>
        <h1 class="registry-title">Model Cards</h1>
        <p class="result-count" id="resultCount">Showing 20 models</p>
      </div>
      <select class="sort-select" id="sortSelect" aria-label="Sort models">
        <option value="name">Name A–Z</option>
        <option value="provider">Provider</option>
        <option value="context">Context window</option>
        <option value="updated">Recently updated</option>
      </select>
    </div>
    <div class="cards-grid" id="cardsGrid" role="list"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ── Data ──

// ── State ──
let activeProvider = "All";
let activeCategory = "All";
let activeAccess = "All";
let searchQuery = "";
let sortBy = "name";

// ── Filter helpers ──
function getFiltered() {
  return MODELS.filter(m => {
    if (activeProvider !== "All" && m.provider !== activeProvider) return false;
    if (activeCategory !== "All" && m.category !== activeCategory) return false;
    if (activeAccess !== "All" && m.access !== activeAccess) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return m.name.toLowerCase().includes(q) || m.provider.toLowerCase().includes(q) ||
             m.description.toLowerCase().includes(q) || m.tags.some(t => t.includes(q));
    }
    return true;
  }).sort((a, b) => {
    if (sortBy === "name") return a.name.localeCompare(b.name);
    if (sortBy === "provider") return a.provider.localeCompare(b.provider);
    if (sortBy === "context") return b.contextNum - a.contextNum;
    if (sortBy === "updated") return b.updated.localeCompare(a.updated);
    return 0;
  });
}

function getCounts(key) {
  const counts = {};
  MODELS.forEach(m => { counts[m[key]] = (counts[m[key]] || 0) + 1; });
  return counts;
}

// ── Render sidebar filters ──
function renderFilters() {
  const providers = getCounts("provider");
  const categories = getCounts("category");
  const accesses = getCounts("access");

  function makeFilterBtns(container, items, activeVal, setter) {
    container.innerHTML = "";
    const allBtn = document.createElement("button");
    allBtn.className = "filter-btn" + (activeVal === "All" ? " active" : "");
    allBtn.innerHTML = `All <span class="filter-count">${MODELS.length}</span>`;
    allBtn.onclick = () => { setter("All"); renderAll(); };
    container.appendChild(allBtn);
    Object.entries(items).sort((a,b)=>b[1]-a[1]).forEach(([k,v]) => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (activeVal === k ? " active" : "");
      btn.innerHTML = `${k} <span class="filter-count">${v}</span>`;
      btn.onclick = () => { setter(k); renderAll(); };
      container.appendChild(btn);
    });
  }

  makeFilterBtns(document.getElementById("providerFilters"), providers, activeProvider, v => activeProvider = v);
  makeFilterBtns(document.getElementById("categoryFilters"), categories, activeCategory, v => activeCategory = v);
  makeFilterBtns(document.getElementById("accessFilters"), accesses, activeAccess, v => activeAccess = v);
}

// ── Render mobile chips ──
function renderMobileChips() {
  const mf = document.getElementById("mobileFilters");
  mf.innerHTML = "";
  const cats = ["All", ...Object.keys(getCounts("category"))];
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "mobile-chip" + (activeCategory === c ? " active" : "");
    btn.textContent = c;
    btn.onclick = () => { activeCategory = c; renderAll(); };
    mf.appendChild(btn);
  });
}

// ── Badge HTML ──
function getBadgeHTML(m) {
  const badges = [];
  if (m.access === "Open") badges.push(`<span class="badge badge-open">Open weights</span>`);
  else badges.push(`<span class="badge badge-closed">Closed</span>`);
  if (m.category === "Multimodal") badges.push(`<span class="badge badge-multimodal">Multimodal</span>`);
  if (m.category === "Reasoning") badges.push(`<span class="badge badge-reasoning">Reasoning</span>`);
  if (m.category === "Code") badges.push(`<span class="badge badge-code">Code</span>`);
  return badges.join("");
}

// ── Render cards ──
function renderCards() {
  const grid = document.getElementById("cardsGrid");
  const filtered = getFiltered();
  document.getElementById("resultCount").textContent = `Showing ${filtered.length} model${filtered.length !== 1 ? "s" : ""}`;
  document.getElementById("totalCount").textContent = `${MODELS.length} models`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6M11 8v6"/></svg>
      <h3>No models found</h3>
      <p>Try adjusting your filters or search query.</p>
      <button onclick="resetFilters()" style="padding:var(--space-3) var(--space-6);background:var(--color-primary);color:var(--color-text-inverse);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:500;">Clear filters</button>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(m => `
    <article class="model-card" role="listitem" onclick="openModal('${m.id}')" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')openModal('${m.id}')">
      <div class="card-top">
        <div class="card-brand">
          <div class="brand-logo" style="background:${m.color};color:${m.textColor}">${m.logoChar}</div>
          <span class="brand-name">${m.provider}</span>
        </div>
        <div class="card-badges">${getBadgeHTML(m)}</div>
      </div>
      <h2 class="card-name">${m.name}</h2>
      <div class="card-version">${m.version}</div>
      <p class="card-desc">${m.description}</p>
      <div class="card-meta">
        <div class="meta-item"><div class="meta-label">Context</div><div class="meta-value">${m.context} tokens</div></div>
        <div class="meta-item"><div class="meta-label">Parameters</div><div class="meta-value">${m.params}</div></div>
        <div class="meta-item"><div class="meta-label">License</div><div class="meta-value">${m.license}</div></div>
        <div class="meta-item"><div class="meta-label">Pricing</div><div class="meta-value" style="font-size:var(--text-xs)">${m.pricing}</div></div>
      </div>
      <div class="card-tags">${m.tags.slice(0,4).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      <div class="card-footer">
        <a href="${m.link}" class="card-link" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
          Official page
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <span class="card-updated">Updated ${m.updated}</span>
      </div>
    </article>
  `).join("");
}

function renderAll() {
  renderFilters();
  renderMobileChips();
  renderCards();
}

function resetFilters() {
  activeProvider = "All"; activeCategory = "All"; activeAccess = "All"; searchQuery = "";
  document.getElementById("searchInput").value = "";
  renderAll();
}

// ── Modal ──
function openModal(id) {
  const m = MODELS.find(x => x.id === id);
  if (!m) return;
  const overlay = document.getElementById("modalOverlay");
  document.getElementById("modalContent").innerHTML = `
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:var(--space-4)">
        <div class="brand-logo" style="background:${m.color};color:${m.textColor};width:44px;height:44px;font-size:16px;border-radius:var(--radius-lg)">${m.logoChar}</div>
        <div>
          <div style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:2px">${m.provider}</div>
          <h2 id="modalTitle" style="font-family:var(--font-display);font-size:var(--text-xl)">${m.name}</h2>
          <div style="font-size:var(--text-xs);color:var(--color-text-faint)">${m.version}</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">Overview</div>
        <p class="modal-desc">${m.description}</p>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Specifications</div>
        <div class="modal-specs">
          <div class="spec-item"><div class="spec-label">Context Window</div><div class="spec-value">${m.context} tokens</div></div>
          <div class="spec-item"><div class="spec-label">Parameters</div><div class="spec-value">${m.params}</div></div>
          <div class="spec-item"><div class="spec-label">License</div><div class="spec-value">${m.license}</div></div>
          <div class="spec-item"><div class="spec-label">Access</div><div class="spec-value">${m.access}</div></div>
          <div class="spec-item"><div class="spec-label">Released</div><div class="spec-value">${m.released}</div></div>
          <div class="spec-item"><div class="spec-label">Pricing</div><div class="spec-value" style="font-size:var(--text-sm)">${m.pricing}</div></div>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Benchmark Scores (approx.)</div>
        ${Object.entries(m.benchmarks).map(([k,v]) => `
          <div class="benchmark-row">
            <div class="benchmark-label">${k}</div>
            <div class="benchmark-bar-wrap"><div class="benchmark-bar" style="width:0%" data-target="${v}%"></div></div>
            <div class="benchmark-score">${v}%</div>
          </div>
        `).join("")}
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Use Cases</div>
        <div class="use-cases">${m.useCases.map(u=>`<span class="use-case-tag">${u}</span>`).join("")}</div>
      </div>
      <div class="modal-section">
        <a href="${m.link}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-6);background:var(--color-primary);color:var(--color-text-inverse);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:500;">
          View official model card
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `;
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
  // Animate benchmark bars
  requestAnimationFrame(() => {
    setTimeout(() => {
      overlay.querySelectorAll(".benchmark-bar").forEach(bar => {
        bar.style.width = bar.dataset.target;
      });
    }, 100);
  });
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

// ── Event listeners ──
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  renderAll();
});
document.getElementById("sortSelect").addEventListener("change", e => {
  sortBy = e.target.value;
  renderCards();
});

// ── Theme toggle ──
(function(){
  const t = document.querySelector("[data-theme-toggle]"), r = document.documentElement;
  let d = matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light";
  r.setAttribute("data-theme", d);
  t && t.addEventListener("click", () => {
    d = d === "dark" ? "light" : "dark";
    r.setAttribute("data-theme", d);
    t.innerHTML = d === "dark"
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

// ── Init ──
renderAll();
</script>
</body>
</html>
